<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance — MyJobHunter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1e3a8a 0%, #2563eb 35%, #7c3aed 75%, #6d28d9 100%);
            color: #fff;
            padding: 1.5rem;
        }
        .container {
            text-align: center;
            max-width: 520px;
            width: 100%;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,.2));
        }
        .brand {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: .5px;
            opacity: .85;
            margin-bottom: 2.5rem;
        }
        .card {
            background: rgba(255,255,255,.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,.18);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 16px 48px rgba(0,0,0,.15);
        }
        .icon { font-size: 3rem; margin-bottom: 1.2rem; }
        h1 {
            font-size: clamp(1.3rem, 4vw, 1.6rem);
            font-weight: 800;
            margin-bottom: .8rem;
            line-height: 1.3;
        }
        p {
            font-size: clamp(.9rem, 2.5vw, 1.05rem);
            opacity: .82;
            line-height: 1.6;
        }
        .pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #34d399;
            border-radius: 50%;
            margin-right: .5rem;
            animation: pulse 2s ease-in-out infinite;
            vertical-align: middle;
        }
        .status {
            margin-top: 2rem;
            font-size: .88rem;
            opacity: .7;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes pulse {
            0%, 100% { opacity: .4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎯</div>
        <div class="brand">MyJobHunter</div>
        <div class="card">
            <div class="icon">🔧</div>
            <h1>MyJobHunter est en maintenance</h1>
            <p>Nous revenons dans quelques instants.<br>Merci de votre patience.</p>
            <div class="status">
                <span class="pulse"></span>
                Maintenance en cours
            </div>
        </div>
    </div>
</body>
</html>
