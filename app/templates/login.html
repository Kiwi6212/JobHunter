<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — JobHunter</title>
    <script nonce="{{ csp_nonce }}">
        (function () {
            var t = localStorage.getItem("jh-theme") || "light";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style nonce="{{ csp_nonce }}">
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }
        .login-logo p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .login-field {
            margin-bottom: 1.25rem;
        }
        .login-field label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .login-field input {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .login-field input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .login-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            padding: 0.65rem 0.85rem;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
        }
        .login-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-submit:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <h1>JobHunter</h1>
            <p>Connexion requise</p>
        </div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        {% if request.args.get('ok') == 'password_reset' %}
        <div style="background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:6px;
                    padding:.65rem .85rem;font-size:.9rem;margin-bottom:1.25rem;">
            ✓ Mot de passe réinitialisé avec succès. Connectez-vous avec votre nouveau mot de passe.
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('main.login', next=request.args.get('next', '')) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="login-field">
                <label for="username">Identifiant</label>
                <input type="text" id="username" name="username"
                       autocomplete="username" autofocus required>
            </div>
            <div class="login-field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-submit">Se connecter</button>
        </form>
        <div style="text-align:center;margin-top:1rem;font-size:0.88rem;">
            <a href="{{ url_for('main.forgot_password') }}"
               style="color:var(--text-secondary);text-decoration:none;">
                Mot de passe oublié ?
            </a>
        </div>
        <div style="text-align:center;margin-top:0.75rem;font-size:0.88rem;color:var(--text-secondary);">
            Pas encore de compte ? <a href="{{ url_for('main.register') }}"
                style="color:var(--primary-color);text-decoration:none;">S'inscrire</a>
        </div>
    </div>
</div>
</body>
</html>
