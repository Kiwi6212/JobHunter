<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code A2F — JobHunter</title>
    <script nonce="{{ csp_nonce }}">
        (function () {
            var t = localStorage.getItem("jh-theme") || "light";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style nonce="{{ csp_nonce }}">
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }
        .login-logo p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .login-field { margin-bottom: 1.25rem; }
        .login-field label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .login-field input {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-primary);
            font-size: 1.4rem;
            letter-spacing: 0.3em;
            text-align: center;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .login-field input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .login-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            padding: 0.65rem 0.85rem;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
        }
        [data-theme="dark"] .login-error {
            background: #3b0f0f;
            color: #fca5a5;
            border-color: #7f1d1d;
        }
        .login-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-submit:hover { background: #1d4ed8; }
        .login-hint {
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 1rem;
        }
        .login-hint a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .login-hint a:hover { text-decoration: underline; }
        .totp-icon {
            font-size: 2.5rem;
            display: block;
            text-align: center;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <span class="totp-icon">🔐</span>
            <h1>JobHunter</h1>
            <p>Vérification en deux étapes</p>
        </div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('main.login_2fa') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="login-field">
                <label for="totp_code">Code à 6 chiffres</label>
                <input type="text" id="totp_code" name="totp_code"
                       inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                       placeholder="000000" autofocus autocomplete="one-time-code" required>
            </div>
            <button type="submit" class="login-submit">Vérifier</button>
        </form>

        <div class="login-hint">
            Ouvrez votre application <strong>Google Authenticator</strong> ou <strong>Authy</strong>
            et saisissez le code affiché pour <em>MyJobHunter</em>.<br><br>
            <a href="{{ url_for('main.login') }}">← Retour à la connexion</a>
        </div>
    </div>
</div>
</body>
</html>
