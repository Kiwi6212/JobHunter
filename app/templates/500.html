<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Erreur interne — JobHunter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <style>
        body { font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a;
               display: flex; align-items: center; justify-content: center;
               min-height: 100vh; margin: 0; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
                padding: 3rem 2.5rem; max-width: 420px; text-align: center;
                box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 1.4rem; font-weight: 700; margin: 0 0 .6rem; }
        p  { color: #475569; font-size: .95rem; margin: 0 0 1.5rem; line-height: 1.6; }
        a  { display: inline-block; background: #2563eb; color: #fff;
             padding: .65rem 1.5rem; border-radius: 8px; text-decoration: none;
             font-weight: 600; font-size: .95rem; }
        a:hover { background: #1d4ed8; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">⚠️</div>
    <h1>Erreur interne du serveur</h1>
    <p>Une erreur inattendue s'est produite. L'équipe a été notifiée automatiquement.<br>

</div>
