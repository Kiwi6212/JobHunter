<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe — JobHunter</title>
    <script>
        (function () {
            var t = localStorage.getItem("jh-theme") || "light";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo h1 { color: var(--primary-color); font-size: 2rem; margin-bottom: 0.25rem; }
        .login-logo p  { color: var(--text-secondary); font-size: 0.9rem; }
        .login-field { margin-bottom: 1.25rem; }
        .login-field label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .login-field input {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .login-field input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .login-error {
            background: #fee2e2; color: #991b1b;
            border: 1px solid #fca5a5; border-radius: 6px;
            padding: 0.65rem 0.85rem; font-size: 0.9rem; margin-bottom: 1.25rem;
        }
        .login-error ul { margin: 0; padding-left: 1.2rem; }
        [data-theme="dark"] .login-error { background:#3b0f0f; color:#fca5a5; border-color:#7f1d1d; }
        .login-submit {
            width: 100%; padding: 0.75rem;
            background: var(--primary-color); color: white;
            border: none; border-radius: 6px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: background 0.2s;
        }
        .login-submit:hover { background: #1d4ed8; }
        .login-hint {
            font-size: 0.85rem; color: var(--text-secondary);
            text-align: center; margin-top: 1rem;
        }
        .login-hint a { color: var(--primary-color); text-decoration: none; }
        .login-hint a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <h1>JobHunter</h1>
            <p>Réinitialisation du mot de passe</p>
        </div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        <div class="login-hint">
            <a href="{{ url_for('main.forgot_password') }}">← Recommencer la procédure</a>
        </div>
        {% else %}
            {% if errors %}
            <div class="login-error">
                <ul>{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>
            </div>
            {% endif %}
            <form method="POST" action="{{ url_for('main.reset_password', token=token) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="login-field">
                    <label for="new_password">Nouveau mot de passe</label>
                    <input type="password" id="new_password" name="new_password"
                           autocomplete="new-password" minlength="8" maxlength="72"
                           autofocus required>
                </div>
                <div class="login-field">
                    <label for="confirm_password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm_password" name="confirm_password"
                           autocomplete="new-password" required>
                </div>
                <button type="submit" class="login-submit">Enregistrer le nouveau mot de passe</button>
            </form>
            <div class="login-hint">
                <a href="{{ url_for('main.login') }}">← Annuler</a>
            </div>
        {% endif %}
    </div>
</div>
</body>
</html>
