<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation en attente — JobHunter</title>
    <script nonce="{{ csp_nonce }}">
        (function () {
            var t = localStorage.getItem("jh-theme") || "light";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style nonce="{{ csp_nonce }}">
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .login-logo {
            margin-bottom: 1.5rem;
        }
        .login-logo h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }
        .pending-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .pending-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }
        .pending-text {
            color: var(--text-secondary);
            font-size: 0.92rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .resend-btn {
            display: inline-block;
            padding: 0.65rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .resend-btn:hover { background: #1d4ed8; }
        .resend-btn:disabled {
            background: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
        }
        .resend-msg {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            min-height: 1.2em;
        }
        .login-footer {
            margin-top: 1.5rem;
            font-size: 0.88rem;
            color: var(--text-secondary);
        }
        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .login-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <h1>JobHunter</h1>
        </div>
        <div class="pending-icon">&#9993;</div>
        <div class="pending-title">Vérifiez votre boîte email</div>
        <div class="pending-text">
            Un email de confirmation a été envoyé à votre adresse.<br>
            Cliquez sur le lien dans l'email pour activer votre compte.<br>
            <strong>Pensez à vérifier vos spams.</strong>
        </div>

        {% if uid %}
        <form id="resend-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="user_id" value="{{ uid }}">
            <button type="submit" class="resend-btn" id="resend-btn">
                Renvoyer l'email de confirmation
            </button>
        </form>
        <div class="resend-msg" id="resend-msg"></div>
        {% endif %}

        <div class="login-footer">
            <a href="{{ url_for('main.login') }}">Retour à la connexion</a>
        </div>
    </div>
</div>

{% if uid %}
<script nonce="{{ csp_nonce }}">
(function () {
    "use strict";
    var form = document.getElementById("resend-form");
    var btn = document.getElementById("resend-btn");
    var msg = document.getElementById("resend-msg");
    var csrfToken = form.querySelector("[name=csrf_token]").value;

    form.addEventListener("submit", function (e) {
        e.preventDefault();
        btn.disabled = true;
        msg.textContent = "";
        msg.style.color = "";

        fetch("{{ url_for('main.resend_confirmation') }}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json",
                "X-CSRFToken": csrfToken
            },
            body: JSON.stringify({ user_id: {{ uid }} })
        })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (data.ok) {
                msg.textContent = data.message || "Email envoyé !";
                msg.style.color = "#16a34a";
                // Keep button disabled for 60s
                var remaining = 60;
                btn.textContent = "Renvoyer (" + remaining + "s)";
                var timer = setInterval(function () {
                    remaining--;
                    btn.textContent = "Renvoyer (" + remaining + "s)";
                    if (remaining <= 0) {
                        clearInterval(timer);
                        btn.disabled = false;
                        btn.textContent = "Renvoyer l'email de confirmation";
                    }
                }, 1000);
            } else {
                msg.textContent = data.error || "Erreur inconnue.";
                msg.style.color = "#dc2626";
                btn.disabled = false;
            }
        })
        .catch(function () {
            msg.textContent = "Erreur réseau.";
            msg.style.color = "#dc2626";
            btn.disabled = false;
        });
    });
})();
</script>
{% endif %}
</body>
</html>
