<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — JobHunter</title>
    <script nonce="{{ csp_nonce }}">
        (function () {
            var t = localStorage.getItem("jh-theme") || "light";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style nonce="{{ csp_nonce }}">
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }
        .login-logo p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .login-field {
            margin-bottom: 1.25rem;
        }
        .login-field label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .login-field input,
        .login-field select {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .login-field input:focus,
        .login-field select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .login-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            padding: 0.65rem 0.85rem;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
        }
        .login-error ul {
            margin: 0;
            padding-left: 1.2rem;
        }
        .login-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-submit:hover {
            background: #1d4ed8;
        }
        .login-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.88rem;
            color: var(--text-secondary);
        }
        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <h1>JobHunter</h1>
            <p>Créer un compte</p>
        </div>

        {% if errors %}
        <div class="login-error">
            <ul>
                {% for e in errors %}<li>{{ e }}</li>{% endfor %}
            </ul>
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('main.register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="login-field">
                <label for="username">Identifiant</label>
                <input type="text" id="username" name="username"
                       value="{{ request.form.get('username', '') }}"
                       autocomplete="username" autofocus required>
            </div>
            <div class="login-field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password"
                       autocomplete="new-password" required>
            </div>
            <div class="login-field">
                <label for="confirm_password">Confirmer le mot de passe</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       autocomplete="new-password" required>
            </div>
            <div class="login-field">
                <label for="domain_id">Domaine de recherche</label>
                <select id="domain_id" name="domain_id" required>
                    <option value="">— Choisissez votre domaine —</option>
                    {% for d in domains %}
                    <option value="{{ d.id }}"
                        {{ 'selected' if request.form.get('domain_id') == d.id|string }}>
                        {{ d.name }}{% if d.description %} — {{ d.description }}{% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="login-field">
                <label for="security_question">Question de sécurité</label>
                <select id="security_question" name="security_question" required>
                    <option value="">— Choisissez une question —</option>
                    {% for q in security_questions %}
                    <option value="{{ q }}"
                        {{ 'selected' if request.form.get('security_question') == q }}>
                        {{ q }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="login-field">
                <label for="security_answer">Réponse secrète</label>
                <input type="text" id="security_answer" name="security_answer"
                       autocomplete="off"
                       placeholder="Votre réponse (insensible à la casse)" required>
            </div>
            <button type="submit" class="login-submit">Créer mon compte</button>
        </form>

        <div class="login-footer">
            Déjà inscrit ? <a href="{{ url_for('main.login') }}">Se connecter</a>
        </div>
    </div>
</div>
</body>
</html>
