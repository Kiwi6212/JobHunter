# JobHunter — Nginx reverse proxy configuration
#
# Setup:
#   1. Copy to:  /etc/nginx/sites-available/jobhunter
#   2. Enable:   ln -s /etc/nginx/sites-available/jobhunter /etc/nginx/sites-enabled/jobhunter
#   3. Edit server_name below (replace YOUR_IP and YOUR_DOMAIN)
#   4. Reload:   nginx -s reload
#
# For HTTPS with Let's Encrypt:
#   certbot --nginx -d yourdomain.com

server {
    listen 80;

    # Replace with your server's public IP and/or domain name
    # Examples:
    #   server_name 192.168.1.100;
    #   server_name jobhunter.example.com;
    #   server_name 192.168.1.100 jobhunter.example.com;
    server_name YOUR_IP YOUR_DOMAIN;

    # Increase upload limit for CV and documents (default nginx = 1 MB)
    client_max_body_size 10M;

    # Proxy all requests to Flask / Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        # Increase timeouts for slow Claude API calls (cover letter generation)
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;
    }

    # Static files served directly by Nginx (faster than Flask)
    # Update the alias path to match your deployment directory
    location /static/ {
        alias /opt/jobhunter/app/static/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/jobhunter_access.log;
    error_log  /var/log/nginx/jobhunter_error.log warn;
}

